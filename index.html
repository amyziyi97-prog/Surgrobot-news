<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>精锋医疗 · 手术机器人行业资讯台(自动更新版)</title>
<style>
  :root{
    --ink:#0d1b2a;--paper:#f6f7f9;--panel:#fff;--line:#dfe3e8;--muted:#5c6b7a;
    --accent:#0a6e72;--accent-soft:#e3f0f0;--signal:#c2410c;--grid:#eef1f4;
    --mono:'SFMono-Regular',ui-monospace,Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--sans);background:var(--paper);color:var(--ink);line-height:1.65;-webkit-font-smoothing:antialiased}
  header{background:var(--ink);color:#fff;padding:26px 28px 22px;border-bottom:3px solid var(--accent)}
  .head-row{max-width:1100px;margin:0 auto;display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:14px}
  .brand{display:flex;align-items:center;gap:13px}
  .mark{width:38px;height:38px;border:2px solid var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;position:relative;flex:0 0 auto}
  .mark::before{content:"";width:14px;height:14px;border:2px solid var(--accent);border-radius:50%}
  .mark::after{content:"";position:absolute;width:4px;height:4px;background:var(--signal);border-radius:50%}
  h1{font-size:19px;font-weight:650;letter-spacing:.5px}
  .sub{font-size:12px;color:#9fb0bd;font-family:var(--mono);margin-top:2px}
  .clock{font-family:var(--mono);font-size:12px;color:#9fb0bd;text-align:right}
  .clock b{color:var(--accent)}
  main{max-width:1100px;margin:0 auto;padding:30px 20px 70px}
  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:7px;display:flex;align-items:center;gap:9px}
  .eyebrow::before{content:"";width:22px;height:2px;background:var(--accent)}
  h2{font-size:22px;font-weight:680;margin-bottom:6px}
  .sec-note{color:var(--muted);font-size:14px;margin-bottom:20px;max-width:760px}
  .searchbar{display:flex;gap:8px;margin-bottom:16px}
  .searchbar input{flex:1;padding:10px 14px;border:1px solid var(--line);border-radius:9px;font-size:14px;font-family:var(--sans);outline:none}
  .searchbar input:focus{border-color:var(--accent)}
  .feed-tools{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:20px;align-items:center}
  .filter{font-family:var(--mono);font-size:12px;padding:6px 12px;border:1px solid var(--line);background:var(--panel);color:var(--muted);border-radius:20px;cursor:pointer;transition:.15s}
  .filter:hover{border-color:var(--accent);color:var(--accent)}
  .filter.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .count{font-family:var(--mono);font-size:12px;color:var(--muted);margin-left:auto}
  .feed{position:relative;padding-left:26px}
  .feed::before{content:"";position:absolute;left:7px;top:6px;bottom:6px;width:2px;background:var(--line)}
  .item{position:relative;padding:0 0 26px}
  .item::before{content:"";position:absolute;left:-23px;top:6px;width:11px;height:11px;border-radius:50%;background:var(--panel);border:2.5px solid var(--accent);z-index:1}
  .item.major::before{border-color:var(--signal);background:var(--signal);box-shadow:0 0 0 4px rgba(194,65,12,.13)}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:16px 18px;transition:.18s}
  .card:hover{border-color:var(--accent);box-shadow:0 4px 18px rgba(13,27,42,.06);transform:translateY(-1px)}
  .meta{display:flex;align-items:center;gap:9px;margin-bottom:7px;flex-wrap:wrap}
  .date{font-family:var(--mono);font-size:12px;color:var(--muted);font-weight:600}
  .tag{font-size:11px;padding:2px 9px;border-radius:5px;font-weight:600}
  .tag.company{background:var(--accent-soft);color:var(--accent)}
  .tag.policy{background:#fef0e6;color:var(--signal)}
  .tag.market{background:#eaf1fb;color:#1d4ed8}
  .tag.tech{background:#eef7ee;color:#15803d}
  .tag.global{background:#f3edfb;color:#7c3aed}
  .tag.auto{background:#eef1f4;color:#5c6b7a}
  .badge-new{background:var(--signal);color:#fff;font-size:10px;padding:2px 7px;border-radius:5px;font-family:var(--mono)}
  .card h3{font-size:15.5px;font-weight:650;line-height:1.45;margin-bottom:5px}
  .card h3 a{color:inherit;text-decoration:none}
  .card h3 a:hover{color:var(--accent)}
  .card p{font-size:13.5px;color:var(--muted);line-height:1.6}
  .card .src{font-size:11.5px;color:#9aa7b3;margin-top:9px;font-family:var(--mono)}
  .card .src a{color:var(--accent);text-decoration:none}
  .empty{text-align:center;color:var(--muted);padding:50px 20px;font-size:14px}
  footer{border-top:1px solid var(--line);padding:22px 20px;text-align:center;color:var(--muted);font-size:12px;font-family:var(--mono);max-width:1100px;margin:0 auto}
  @media(max-width:560px){.clock{display:none}}
</style>
</head>
<body>
<header>
  <div class="head-row">
    <div class="brand">
      <div class="mark"></div>
      <div>
        <h1>精锋医疗 · 手术机器人行业资讯台</h1>
        <div class="sub">AUTO-UPDATING · SURGICAL ROBOTICS INTEL</div>
      </div>
    </div>
    <div class="clock">
      数据状态 · <b id="status">加载中…</b><br>
      <span id="today"></span>
    </div>
  </div>
</header>

<main>
  <div class="eyebrow">Live Feed</div>
  <h2>行业资讯流</h2>
  <p class="sec-note">机器人每天自动抓取最新资讯并入库;下方"种子"资讯为已核实的历史背景。可搜索、可按分类筛选。</p>

  <div class="searchbar">
    <input id="q" type="search" placeholder="搜索标题或正文,例如:远程手术、医保、CE 认证…">
  </div>
  <div class="feed-tools" id="filters"></div>
  <div class="feed" id="feedList"></div>
</main>

<footer>
  精锋医疗行业资讯台 · 自动更新版 · 数据来源见各条目链接 · 重大决策请核实原始来源
</footer>

<script>
/* ── 手工种子数据:已核实的历史背景,保证网页第一天就不空 ── */
const SEED = [
  {date:"2026.01.20",cat:"policy",major:true,isNew:false,title:"国家医保局发布《辅助操作类立项指南》,手术机器人收费有了国标",body:"分档设立导航、参与执行、精准执行三个价格项目,按临床价值系数化收费,并单设远程手术项目。被视为打通商业化最后一公里的里程碑。",src:"国家医保局",url:"https://www.nhsa.gov.cn/art/2026/1/20/art_14_19433.html"},
  {date:"2026.01.08",cat:"company",major:true,isNew:false,title:"精锋医疗登陆港交所,成 2026 深圳 IPO 第一股",body:"02675.HK 挂牌,发行价 43.24 港元,首日涨超 30%,市值破 200 亿港元;公开发售约 1092 倍认购。",src:"机器人大讲堂",url:"https://leaderobot.com/news/7046"},
  {date:"2025.10",cat:"global",major:false,isNew:false,title:"单孔 SP1000 获欧盟 CE,海外订单占比过半",body:"MP1000(3月)、SP1000(10月)双获 CE;截至 2025.10 已签 72 台海外订单,占全球 118 台的 61%。",src:"新浪财经",url:"https://finance.sina.com.cn/stock/relnews/hk/2026-01-23/doc-inhihsrv4977521.shtml"},
];

const CATS={all:"全部",company:"公司",policy:"政策",market:"市场",tech:"技术",global:"海外",auto:"自动抓取"};
let active="all", keyword="", ALL=[];

async function load(){
  let auto=[];
  try{
    const r=await fetch("news.json?t="+Date.now());
    if(r.ok){auto=await r.json(); auto.forEach(x=>{if(!x.cat)x.cat="auto";});}
    document.getElementById("status").textContent = auto.length? `已抓取 ${auto.length} 条`:"暂无抓取数据";
  }catch(e){
    document.getElementById("status").textContent="种子数据(未连抓取)";
  }
  // 合并去重(按 url)
  const seen=new Set(), merged=[];
  [...auto,...SEED].forEach(x=>{const k=x.url||x.title; if(!seen.has(k)){seen.add(k);merged.push(x);}});
  merged.sort((a,b)=>(b.date||"").localeCompare(a.date||""));
  ALL=merged;
  renderFilters(); render();
}

function renderFilters(){
  const box=document.getElementById("filters"); box.innerHTML="";
  Object.keys(CATS).forEach(k=>{
    const b=document.createElement("button");
    b.className="filter"+(k===active?" on":""); b.textContent=CATS[k];
    b.onclick=()=>{active=k;renderFilters();render();};
    box.appendChild(b);
  });
  const c=document.createElement("span"); c.className="count"; c.id="cnt"; box.appendChild(c);
}

function render(){
  const list=document.getElementById("feedList"); list.innerHTML="";
  let data=ALL.filter(n=>active==="all"||n.cat===active);
  if(keyword){
    const q=keyword.toLowerCase();
    data=data.filter(n=>(n.title||"").toLowerCase().includes(q)||(n.body||"").toLowerCase().includes(q));
  }
  document.getElementById("cnt").textContent=data.length+" 条";
  if(!data.length){list.innerHTML='<div class="empty">没有匹配的资讯。换个关键词或筛选试试。</div>';return;}
  data.forEach(n=>{
    const it=document.createElement("div");
    it.className="item"+(n.major?" major":"");
    const title=n.url?`<a href="${n.url}" target="_blank" rel="noopener">${n.title}</a>`:n.title;
    it.innerHTML=`<div class="card">
      <div class="meta">
        <span class="date">${n.date||""}</span>
        <span class="tag ${n.cat}">${CATS[n.cat]||n.cat}</span>
        ${n.isNew?'<span class="badge-new">NEW</span>':''}
      </div>
      <h3>${title}</h3>
      ${n.body?`<p>${n.body}</p>`:''}
      <div class="src">来源 · ${n.url?`<a href="${n.url}" target="_blank" rel="noopener">${n.src} ↗</a>`:n.src}</div>
    </div>`;
    list.appendChild(it);
  });
}

document.getElementById("q").addEventListener("input",e=>{keyword=e.target.value.trim();render();});
document.getElementById("today").textContent="今天 "+new Date().toLocaleDateString("zh-CN",{year:"numeric",month:"2-digit",day:"2-digit"});
load();
</script>
</body>
</html>
